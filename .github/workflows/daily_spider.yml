name: AI HuggingFace Tracker

on:
  schedule:
    # 每天北京时间早上 8:00 执行
    - cron: '0 0 * * *'
  workflow_dispatch: 

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须权限：推送 Commit
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install requests playwright
          playwright install chromium
          playwright install-deps chromium
          
      - name: Run HF Crawler & AI Summarizer
        env:
          # 注入你的 GitHub Secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python crawler.py
        
      - name: Commit and Push JSON and Icons
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          TODAY=$(date -u +'%Y-%m-%d')
          
          # 添加生成的当天日期文件夹 (内部包含 .json 和 icons/ 目录)
          git add "$TODAY/"
          
          git commit -m "🚀 Auto Add: AI Summarized models and icons for $TODAY" || echo "No changes to commit today."
          git push
