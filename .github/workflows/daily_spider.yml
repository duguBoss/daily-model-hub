name: HuggingFace JSON Crawler

on:
  schedule:
    # 每天 UTC 时间 0:00 (北京时间早上 8:00) 触发
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动点击触发

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 必须：允许机器人推送代码到仓库
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests
          
      - name: Run HF Crawler
        run: python crawler.py
        
      - name: Commit and Push JSON files
        run: |
          # 配置 Git 机器人的账户信息
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 获取当天的日期作为文件夹名称 (格式: YYYY-MM-DD)
          TODAY=$(date -u +'%Y-%m-%d')
          
          # 将今天生成的文件夹添加到 Git
          git add "$TODAY/"
          
          # 提交更改 (如果没有任何更新，加上 || echo 避免 Actions 报错退出)
          git commit -m "🤖 Auto update HuggingFace models data for $TODAY" || echo "No changes to commit today."
          
          # 推送到当前分支
          git push
